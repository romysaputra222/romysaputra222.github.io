  <!DOCTYPE html>
   <html lang="en">
   <head>
    <meta charset="UTF-8">
    <style>
        * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: arial;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #07252d;
}

h2 {
  position: relative;
  font-size: 5rem;
  letter-spacing: 5px;
  color: #0e3742;
  text-transform: uppercase;
  width: 100%;
  text-align: center;
  -webkit-box-reflect: below 1px linear-gradient(transparent, #0004);
  line-height: 0.70em;
  outline: none;
  animation: light 5s linear infinite;
}

@keyframes light {
  0%,18%,20%,50.1%,60%,65.1%,80%,90.1%,82% {
    color: #0e3742;
    text-shadow: none;
  }
  18.1%,20.1%,30%,50%,60%,65.1%,81.1%,90%,82.1%,100% {
    color: #fff;
    text-shadow: 0 0 10px #03bcf4,
                 0 0 20px #03bcf4,
                 0 0 40px #03bcf4,
                 0 0 80px #03bcf4,
                 0 0 160px #03bcf4;
  }
}
    </style>
    <title>Document</title>
  </head>
  <body>
    <div>
        <h2 contenteditable="true">R O M Y</h2>
    </div>
  </body>
  </html>
